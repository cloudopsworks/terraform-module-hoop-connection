# Terragrunt Boilerplate Configuration
variables:
  # Generic Boilerplate Variables Setup
  - name: is_hub
    order: 0
    description: "Is this a hub configuration?"
    type: bool
    default: false
  - name: tags
    order: 1
    description: "Tags"
    type: map
    default: {}
  # End - Generic Boilerplate Variables Setup
  - name: dependency_module
    order: 2
    description: "Hoop Connection dependency is enabled? When true, connections are read from the upstream module output."
    type: bool
    default: false
  - name: dependency_module_path
    order: 3
    description: "Path to compatible `hoop_connections` output module, required if dependency_module is true"
    type: string
    default: "../source-module"
  - name: dependency_module_name
    order: 4
    description: "Name of compatible `hoop_connections` output module, required if dependency_module is true"
    type: string
    default: "source_module"

hooks:
  after:
    - command: "git"
      args: ["add", "."]
      dir: "{{ outputFolder }}"